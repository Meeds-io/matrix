# Hidden instructions for the Matrix chat UX bindings.
# Modeled on the AI addon's own bindings (Summarize-Notes / Rewrite-text / Rephrase-my-writing):
#   - promptTemplate        : the user-facing instruction sent to the agent
#   - outputPromptTemplate   : extra (hidden) context appended; {content_body} is replaced
#                              inline by the text the chat front-end passes as objectContent.
# {content_body} = the message text / conversation messages / unread digest provided by the UI.

# --- Single message ---
AiAgentChat.uxBindings.Chat-Summarize-Message.name=Summarize this message
AiAgentChat.uxBindings.Chat-Summarize-Message.promptTemplate=Give a short, clear summary of the chat message below.
AiAgentChat.uxBindings.Chat-Summarize-Message.outputPromptTemplate=# Chat message to summarize:\n{content_body}

AiAgentChat.uxBindings.Chat-Translate-Message.name=Translate this message
AiAgentChat.uxBindings.Chat-Translate-Message.promptTemplate=Detect the language of the chat message below and translate it into my language. State the detected source language first, then give the translation.
AiAgentChat.uxBindings.Chat-Translate-Message.outputPromptTemplate=# Chat message to translate:\n{content_body}

AiAgentChat.uxBindings.Chat-Draft-Reply.name=Draft a reply
AiAgentChat.uxBindings.Chat-Draft-Reply.promptTemplate=Draft a clear, friendly and concise reply to the chat message below. Return only the suggested reply text.
AiAgentChat.uxBindings.Chat-Draft-Reply.outputPromptTemplate=# Chat message to reply to:\n{content_body}

# --- Whole conversation (tool-based: agent reads messages via the get_chat_messages MCP tool) ---
AiAgentChat.uxBindings.Chat-Summarize-Room.name=Summarize this conversation
AiAgentChat.uxBindings.Chat-Summarize-Room.promptTemplate=Summarize this conversation in a brief, structured way: main topics, key points, decisions, and any open questions or actions to follow up.
AiAgentChat.uxBindings.Chat-Summarize-Room.outputPromptTemplate=Use the get_chat_messages tool with conversation_id "{content_id}" to read this conversation's recent messages, then write the summary.

# --- Across conversations / catch-up (tool-based: agent reads via get_unread_chat_messages) ---
AiAgentChat.uxBindings.Chat-Summarize-Conversations.name=Catch me up
AiAgentChat.uxBindings.Chat-Summarize-Conversations.promptTemplate=Give me a concise catch-up across my recent conversations: who wrote and about what, grouped by conversation, and clearly flag anything that needs my attention or a reply.
AiAgentChat.uxBindings.Chat-Summarize-Conversations.outputPromptTemplate=Call the get_unread_chat_messages tool to retrieve my unread conversations and their recent messages, then write the catch-up. If there are no unread messages, tell me there is nothing new.
